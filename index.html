<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AK Store & Inventory - Update 1.0</title>
<style>
    * { margin:0; padding:0; box-sizing:border-box; font-family:Arial, sans-serif; }
    body { background:#050816; color:#fff; overflow-x: hidden; width: 100%; }
    
    /* Optimized background layout to prevent hanging */
    .video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: -1; opacity: 1; background: #050816; pointer-events: none; }
    
    #welcomePage, #inventoryPage, #loginOverlay { min-height: 100vh; width: 100%; position: relative; display: flex; flex-direction: column; }
    #welcomePage { justify-content: center; align-items: center; text-align: center; padding: 20px; }
    
    .content-box { text-align: center; width: 100%; max-width: 500px; }
    .welcome-text { font-size: clamp(40px, 10vw, 80px); font-weight: 900; color: #fff; text-shadow: 0 0 20px #00ffff; }
    .divider { width: 60%; height: 3px; background: #00ffff; margin: 15px auto; box-shadow: 0 0 15px #00ffff; }
    .sub-title { font-size: 16px; letter-spacing: 3px; color: #00ffff; margin-bottom: 30px; }
    
    .btn { padding: 15px 40px; border: 2px solid cyan; background: rgba(0, 255, 255, 0.1); color: cyan; font-size: 18px; font-weight: bold; cursor: pointer; border-radius: 50px; text-shadow: 0 0 5px cyan; box-shadow: 0 0 10px rgba(0,255,255,0.2); }
    .btn:hover { background: rgba(0, 255, 255, 0.3); box-shadow: 0 0 20px rgba(0,255,255,0.5); }
    .btn:disabled { background: rgba(255, 255, 255, 0.05); border-color: #555; color: #555; text-shadow: none; box-shadow: none; cursor: not-allowed; }
    .exit-btn { padding: 8px 15px; border: 1px solid #ff4444; background: rgba(255, 68, 68, 0.1); color: #ff4444; font-size: 14px; font-weight: bold; cursor: pointer; border-radius: 50px; }
    
    #loginOverlay { display: none; justify-content: center; align-items: center; padding: 20px; }
    .login-box { background: rgba(16, 27, 53, 0.9); padding: 30px; border-radius: 15px; border: 2px solid #00ffff; box-shadow: 0 0 25px rgba(0,255,255,0.3); width: 100%; max-width: 380px; text-align: left; }
    .login-box h3 { text-align: center; margin-bottom: 20px; color: #00ffff; font-size: 24px; text-shadow: 0 0 10px #00ffff; }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 5px; color: #00ffff; font-size: 14px; font-weight: bold; }
    .form-group input { width: 100%; padding: 12px; border-radius: 5px; border: 1px solid cyan; background: rgba(0,0,0,0.6); color: white; font-size: 16px; }
    .form-group input:focus { outline: none; box-shadow: 0 0 10px cyan; }
    .login-msg { margin-top: 15px; text-align: center; font-weight: bold; font-size: 15px; padding: 5px; border-radius: 4px; }

    #inventoryPage { display: none; padding: 15px; }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; background: rgba(0,0,0,0.5); padding: 10px; border-radius: 10px; }
    .search-area { display: flex; gap: 5px; justify-content: center; margin-bottom: 20px; }
    input { padding: 10px; flex: 1; border-radius: 5px; border: 1px solid cyan; background: rgba(0,0,0,0.7); color: white; }
    
    .count-text { color: cyan; margin-bottom: 10px; font-size: 12px; text-align: center; }
    .box-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .box { background: rgba(16, 27, 53, 0.8); padding: 8px; border-radius: 8px; cursor: pointer; border: 1px solid #00ff99; text-align: center; font-size: 10px; overflow: hidden; }
    
    .card { background: rgba(16, 27, 53, 0.95); padding: 20px; border-radius: 10px; border-left: 5px solid #00ff99; color: #00ff99; margin-top: 10px; }
    .nav-btn { margin-top: 10px; padding: 8px 15px; cursor: pointer; background: #00ff99; border: none; border-radius: 5px; color: black; font-weight: bold; }
    .edit-btn { background: #333; color: white; border: none; padding: 2px 6px; border-radius: 3px; font-size: 9px; margin-left: 3px; }
</style>
</head>
<body>

<video autoplay muted loop playsinline preload="none" id="bgVid" class="video-bg">
    <source src="https://files.catbox.moe/js7nft.mov" type="video/mp4">
</video>

<div id="welcomePage">
    <div class="content-box">
        <div class="welcome-text">WELCOME</div>
        <div class="divider"></div>
        <div class="sub-title">AK INVENTORY</div>
        <button class="btn" onclick="showLoginBox()">ENTER STORE</button>
    </div>
</div>

<div id="loginOverlay">
    <div class="login-box">
        <h3>STORE LOCK</h3>
        <form id="loginForm">
            <div class="form-group">
                <label>Your Name</label>
                <input type="text" id="fullName" required placeholder="Enter Your Name">
            </div>
            <div class="form-group">
                <label>ID</label>
                <input type="text" id="username" required placeholder="Enter ID">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" required placeholder="Enter Password">
            </div>
            <button type="submit" id="submitBtn" class="btn" style="width:100%; border-radius:5px; padding:12px; font-size:16px;">Request Access</button>
            <button type="button" class="exit-btn" style="width:100%; margin-top:10px; padding:10px;" onclick="cancelLogin()">Back to Home</button>
        </form>
        <div id="loginStatus" class="login-msg"></div>
    </div>
</div>

<div id="inventoryPage">
    <div class="header">
        <h1 style="color:cyan; font-size: 18px;">AK INVENTORY</h1>
        <button class="btn" style="padding: 5px 12px; font-size: 12px;" onclick="addNewBox()">+ ADD</button>
    </div>
    <div class="search-area">
        <button class="exit-btn" onclick="goBackToHome()">EXIT</button>
        <input id="search" placeholder="Search..." oninput="render()">
    </div>
    <div id="countDisplay" class="count-text"></div>
    <div id="boxList" class="box-grid"></div>
    <div id="result"></div>
</div>

<script>
    const SCRIPT_URL = const SCRIPT_URL = "";
    let checkInterval;
    let wrongAttempts = 0; 
    let inventory = JSON.parse(localStorage.getItem('akStoreData')) || [];

    // 🌟 FIXED: Video ko alag background thread me play kiya hai taaki typing delay na ho
    window.addEventListener('load', () => {
        setTimeout(() => {
            const vid = document.getElementById('bgVid');
            if (vid) {
                vid.play().catch(() => console.log("Autoplay waiting for interaction."));
            }
        }, 100); 
    });

    function showLoginBox() {
        const vid = document.getElementById('bgVid');
        if (vid) vid.play().catch(() => {});

        document.getElementById('welcomePage').style.display = 'none';
        document.getElementById('loginOverlay').style.display = 'flex';
        document.getElementById('loginStatus').innerText = '';
    }

    function cancelLogin() {
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('welcomePage').style.display = 'flex';
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const nameVal = document.getElementById('fullName').value.trim();
        const idVal = document.getElementById('username').value.trim();
        const passVal = document.getElementById('password').value.trim();
        const statusMsg = document.getElementById('loginStatus');
        const submitBtn = document.getElementById('submitBtn');

        if (idVal === "AKKTE" && passVal === "KTE483501") {
            wrongAttempts = 0; 
            statusMsg.style.color = "orange";
            statusMsg.innerText = "Sending authorization request...";

            fetch(`${SCRIPT_URL}?action=requestLogin&username=${encodeURIComponent(nameVal)}`)
            .then(res => res.json())
            .then(data => {
                statusMsg.innerText = `Hi ${nameVal}, waiting for Admin Approval...`;
                startCheckingApproval(data.requestId);
            })
            .catch(() => {
                statusMsg.style.color = "red";
                statusMsg.innerText = "Server configuration needed.";
            });
        } else {
            wrongAttempts++; 
            statusMsg.style.color = "#ff4444";
            
            if (wrongAttempts === 1) {
                statusMsg.innerText = "⚠️ Warning: Incorrect ID or Password. (2 attempts left)";
            } else if (wrongAttempts === 2) {
                statusMsg.innerText = "🚨 Final Warning: Incorrect details. Next failure will lock you out! (1 attempt left)";
            } else {
                statusMsg.innerText = "❌ Security Lockout: Too many wrong attempts! Try again after 1 minute.";
                submitBtn.disabled = true;
                let timeLeft = 60;
                
                let timerInterval = setInterval(() => {
                    timeLeft--;
                    submitBtn.innerText = `Locked... Try again in ${timeLeft}s`;
                    
                    if (timeLeft <= 0) {
                        clearInterval(timerInterval);
                        submitBtn.disabled = false;
                        submitBtn.innerText = "Request Access";
                        statusMsg.innerText = "Lock open. Please enter correct details.";
                        statusMsg.style.color = "cyan";
                        wrongAttempts = 0; 
                    }
                }, 1000);
            }
        }
    });

    function startCheckingApproval(reqId) {
        if(checkInterval) clearInterval(checkInterval);
        checkInterval = setInterval(() => {
            fetch(`${SCRIPT_URL}?action=checkStatus&requestId=${reqId}`)
            .then(res => res.json())
            .then(data => {
                const statusMsg = document.getElementById('loginStatus');
                if (data.status === "YES") {
                    clearInterval(checkInterval);
                    statusMsg.style.color = "#00ff99";
                    statusMsg.innerText = "Login Successful! Opening Store...";
                    setTimeout(() => { openStore(); }, 1500);
                } else if (data.status === "NO") {
                    clearInterval(checkInterval);
                    statusMsg.style.color = "#ff4444";
                    statusMsg.innerText = "Login Failed! Admin rejected the request.";
                }
            });
        }, 3000);
    }

    function openStore() {
        document.getElementById('search').value = '';
        document.getElementById('welcomePage').style.display = 'none';
        document.getElementById('loginOverlay').style.display = 'none';
        document.getElementById('inventoryPage').style.display = 'flex';
        render();
    }

    function goBackToHome() {
        document.getElementById('search').value = '';
        document.getElementById('inventoryPage').style.display = 'none';
        document.getElementById('welcomePage').style.display = 'flex';
    }

    function render() {
        document.getElementById('result').innerHTML = '';
        document.getElementById('boxList').style.display = 'grid';
        document.getElementById('countDisplay').style.display = 'block';
        const q = document.getElementById('search').value.toLowerCase();
        
        const filtered = inventory.map((d, i) => ({...d, id: i}))
                                  .filter(x => (x.box || "").toLowerCase().includes(q) || (x.item || "").toLowerCase().includes(q));
        
        document.getElementById('countDisplay').innerText = "Total Items: " + filtered.length;
        document.getElementById('boxList').innerHTML = filtered.map(d => `
            <div class="box" onclick="showItem(${d.id})">
                <b>${d.box}</b><br>${d.item}
            </div>`).join('');
    }

    function showItem(i) {
        let item = inventory[i];
        document.getElementById('boxList').style.display = 'none';
        document.getElementById('countDisplay').style.display = 'none';
        document.getElementById('result').innerHTML = `
            <div class="card">
                <h2>${item.item} <button class="edit-btn" onclick="updateField(${i}, 'item')">Edit</button></h2>
                <p>📦 Box: ${item.box} <button class="edit-btn" onclick="updateField(${i}, 'box')">Edit</button></p>
                <p>📍 Row: ${item.row} <button class="edit-btn" onclick="updateField(${i}, 'row')">Edit</button></p>
                <p>🏢 Rack: ${item.rack} <button class="edit-btn" onclick="updateField(${i}, 'rack')">Edit</button></p>
                <p>🔢 Qty: ${item.qty} <button class="edit-btn" onclick="updateField(${i}, 'qty')">Edit</button></p>
                <button class="nav-btn" onclick="render()">BACK</button>
                <button class="nav-btn" style="background:#ff4444; color:white; margin-left:10px" onclick="deleteItem(${i})">DELETE</button>
            </div>`;
    }

    function updateField(i, field) {
        let val = prompt("Update " + field + ":", inventory[i][field] || "");
        if(val !== null) { inventory[i][field] = val; save(); showItem(i); }
    }

    function deleteItem(i) {
        if(confirm("Are you sure?")) { inventory.splice(i, 1); save(); render(); }
    }

    function addNewBox() {
        let box = prompt("Enter Box Number:");
        let item = prompt("Enter Item Name:");
        let row = prompt("Enter Row:");
        let rack = prompt("Enter Rack:");
        let qty = prompt("Enter Quantity:");
        if(box !== null && item !== null) {
            inventory.push({box, item, row, rack, qty});
            save();
        }
    }

    function save() { localStorage.setItem('akStoreData', JSON.stringify(inventory)); render(); }
</script>
</body>
</html>
